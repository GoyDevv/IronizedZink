name: Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses & pre-install platform 37
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-37" > /dev/null 2>&1 || true

      - name: Print toolchain
        run: |
          java -version
          ./gradlew --version

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      # This is the real build gate: fail if assembleDebug did not produce an APK.
      - name: Verify APK
        run: |
          APK=$(find app/build/outputs/apk -name '*.apk' | head -n1)
          if [ -z "$APK" ]; then echo "No APK produced"; exit 1; fi
          echo "Built: $APK"
          ls -lh "$APK"

      # Best-effort convenience upload. Never fails the job (the account's Actions
      # artifact storage may be full — the canonical download is the GitHub Release).
      - name: Upload APK artifact (best effort)
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ironized-zink-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 7
